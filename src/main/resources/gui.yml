id: quests
title: "&0&lQuests"
size: 54
open_args:
  - 'quests'

model: Quests:quests

Items:
  quest1:
    slots:
      - '10-16'
      - '19-25'
      - '28-34'
      - '37-43'
    material: BOOK
    # all_quests
    # category-<id>
    type: all_quests
    display_name: "&e&lQuest &7%quest_name%"
    lore:
      - "&7Type: &f%quest_progress_type%"
      - "&7Status: &f%status%"
      - "&7Objective: &f%quest_description%"
      - "&7Progress: &a%quest_progress%/%quest_target%"
      - ""
      - "&6Rewards:"

  orange:
    material: ORANGE_STAINED_GLASS_PANE
    slots:
      - 0-2
      - 6-8
      - 45
      - 47
      - 51
      - 53
    display_name: " "

  black:
    material: BLACK_STAINED_GLASS_PANE
    slots:
      - 3
      - 5
      - 48
      - 50
    display_name: " "

  gray:
    material: GRAY_STAINED_GLASS_PANE
    slots:
      - 4
    display_name: " "

  menu:
    material: DARK_OAK_DOOR
    slot: 49
    display_name: "&6Return to Menu"
    on_click:
      any:
        - "[open] main"

  next_page:
    material: SPECTRAL_ARROW
    slot: 52
    display_name: "&aNext Page ▶"
    on_click:
      any:
        - "[next_page]"

  prev_page:
    material: ARROW
    slot: 46
    display_name: "&c◀ Previous Page"
    on_click:
      any:
        - "[prev_page]"